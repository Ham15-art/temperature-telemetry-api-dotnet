<svg width="100%" viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Data Flow Diagram — API highlighted</title>
  <desc>Six-step data flow, steps 4–6 highlighted as the API scope</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
      .ts { font-size: 12px; font-weight: 400; fill: #555550; }

      /* teal — step 1 (muted via opacity on group) */
      /* purple — steps 2-3 (muted) */
      /* blue — step 4 */
      .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th   { fill: #0C447C; }
      .c-blue .ts   { fill: #185FA5; }
      /* amber — step 5 */
      .c-amber rect  { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th   { fill: #633806; }
      .c-amber .ts   { fill: #854F0B; }
      /* coral — step 6 */
      .c-coral rect  { fill: #FAECE7; stroke: #993C1D; }
      .c-coral .th   { fill: #4A1B0C; }
      .c-coral .ts   { fill: #993C1D; }

      .muted-box  { fill: #f1efe8; stroke: #c5c3ba; }
      .muted-th   { font-size: 14px; font-weight: 500; fill: #888780; }
      .muted-ts   { font-size: 12px; font-weight: 400; fill: #b4b2a9; }
      .muted-arr  { stroke: #c5c3ba; }
      .scope-rect { fill: none; stroke: #b4b2a9; stroke-width: 1.5; stroke-dasharray: 6 4; }
      .scope-lbl  { font-size: 12px; fill: #888780; }
      .step-lbl   { font-size: 12px; fill: #555550; }
      .step-muted { font-size: 12px; fill: #b4b2a9; }
      .arr { stroke: #555550; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- API scope bracket -->
  <rect class="scope-rect" x="172" y="282" width="336" height="272" rx="12"/>
  <text class="scope-lbl" x="340" y="572" text-anchor="middle">API scope</text>

  <!-- Step 1: Device Simulator — muted -->
  <rect class="muted-box" x="200" y="30" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="muted-th" x="340" y="52" text-anchor="middle" dominant-baseline="central">Device simulator</text>
  <text class="muted-ts" x="340" y="70" text-anchor="middle" dominant-baseline="central">Generates temperature data</text>
  <text class="step-muted" x="188" y="62" text-anchor="end">1</text>

  <!-- Arrow 1 — muted -->
  <line class="muted-arr" x1="340" y1="86" x2="340" y2="118" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Worker IDeviceAdapter — muted -->
  <rect class="muted-box" x="200" y="118" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="muted-th" x="340" y="140" text-anchor="middle" dominant-baseline="central">Worker</text>
  <text class="muted-ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">Reads via IDeviceAdapter</text>
  <text class="step-muted" x="188" y="150" text-anchor="end">2</text>

  <!-- Arrow 2 — muted -->
  <line class="muted-arr" x1="340" y1="174" x2="340" y2="206" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Worker ITelemetryService — muted -->
  <rect class="muted-box" x="200" y="206" width="280" height="56" rx="8" stroke-width="0.5"/>
  <text class="muted-th" x="340" y="228" text-anchor="middle" dominant-baseline="central">Worker</text>
  <text class="muted-ts" x="340" y="246" text-anchor="middle" dominant-baseline="central">Sends via ITelemetryService</text>
  <text class="step-muted" x="188" y="238" text-anchor="end">3</text>

  <!-- Arrow 3 — normal -->
  <line class="arr" x1="340" y1="262" x2="340" y2="294" marker-end="url(#arrow)"/>

  <!-- Step 4: API endpoint — highlighted blue -->
  <g class="c-blue">
    <rect x="200" y="294" width="280" height="56" rx="8" stroke-width="1.5"/>
    <text class="th" x="340" y="316" text-anchor="middle" dominant-baseline="central">API endpoint</text>
    <text class="ts" x="340" y="334" text-anchor="middle" dominant-baseline="central">ReceiveTemperature</text>
  </g>
  <text class="step-lbl" x="188" y="326" text-anchor="end">4</text>

  <!-- Arrow 4 -->
  <line class="arr" x1="340" y1="350" x2="340" y2="382" marker-end="url(#arrow)"/>

  <!-- Step 5: Validation — highlighted amber -->
  <g class="c-amber">
    <rect x="200" y="382" width="280" height="56" rx="8" stroke-width="1.5"/>
    <text class="th" x="340" y="404" text-anchor="middle" dominant-baseline="central">Input validation</text>
    <text class="ts" x="340" y="422" text-anchor="middle" dominant-baseline="central">API validates payload</text>
  </g>
  <text class="step-lbl" x="188" y="414" text-anchor="end">5</text>

  <!-- Arrow 5 -->
  <line class="arr" x1="340" y1="438" x2="340" y2="470" marker-end="url(#arrow)"/>

  <!-- Step 6: MongoDB — highlighted coral -->
  <g class="c-coral">
    <rect x="200" y="470" width="280" height="56" rx="8" stroke-width="1.5"/>
    <text class="th" x="340" y="492" text-anchor="middle" dominant-baseline="central">MongoDB</text>
    <text class="ts" x="340" y="510" text-anchor="middle" dominant-baseline="central">MongoTemperatureRepository</text>
  </g>
  <text class="step-lbl" x="188" y="502" text-anchor="end">6</text>
</svg>
